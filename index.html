<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>karty-datart</title>
    <link rel="stylesheet" href="main.css">
    <link rel="icon" type="image/png" href="media/datart-logo.avif">
</head>
<body>
    <div class="cards">
        <figure class="card">
            <a class="img__wrapper" href="#">
                <img class="img" src="media/sluchátka.jpg">
                </a>
                <a class="product__name" href="#">
                <p class="card__product">Sluchátka Apple AirPods Pro 3</p>
                </a>
                <a class="rating" href="#">
                <div class="rating__box">
            <ul class="stars__textbox">
                <li class="star"><img src="media/star.png" width="18" height="18" alt="star"></li>
                <li class="star"><img src="media/star.png" width="18" height="18" alt="star"></li>
                <li class="star"><img src="media/star.png" width="18" height="18" alt="star"></li>
                <li class="star"><img src="media/star.png" width="18" height="18" alt="star"></li>
                <li class="star"><img src="media/star.png" width="18" height="18" alt="star"></li>
            </ul>
            <span class="ratingValue">4.8</span>
            <span class="ratingValueCount">(419)</span>
        </div>
        </a>
        <div class="discount">

        </div>
    
    <div class="card__textbox">
            <a class="price" href="#">
                6490 Kč
            </a>
            <a class="btn" href="#">
                Vložit do košíku
            </a>
                </div>
        </figure>

        <figure class="card">
            <a href="#">
                <div class="img__wrapper">
                <img class="img" src="media/friteza.jpg" alt="friteza">
                </div>
                </a>
                <a class="product__name" href="#">
                <p class="card__product">Fritéza horkovzušná ETA 6168 90000 ... </p>
                </a>
                <a class="rating" href="#">
                <div class="rating__box">
            <ul class="stars__textbox">
                <li class="star"><img src="media/star.png" width="18" height="18" alt="star"></li>
                <li class="star"><img src="media/star.png" width="18" height="18" alt="star"></li>
                <li class="star"><img src="media/star.png" width="18" height="18" alt="star"></li>
                <li class="star"><img src="media/star.png" width="18" height="18" alt="star"></li>
                <li class="star"><img src="media/star.png" width="18" height="18" alt="star"></li>
            </ul>
            <span class="ratingValue">4.8</span>
            <span class="ratingValueCount">(262)</span>
        </div>
        </a>
        <div class="discount discount--active">
            <span class="discount__percent">-35%</span>
            <span class="discount__price">1689 Kč</span>
            <span class="discount__text"> Koupit s kodem</span>
        </div>
    
    <div class="card__textbox">
            <a class="price" href="#">
               2599 Kč
            </a>
            <a class="btn" href="#">
                Vložit do košíku
            </a>
                </div>
        </figure>

        <figure class="card">
            <a href="#">
                <div class="img__wrapper">
                <img class="img" src="media/tablet.jpg" alt="tablet">
                <img  class="estitek" src="media/estitek.jpg" width="86" height="46">
                </div>
                </a>
                <a class="product__name" href="#">
                <p class="card__product">Dotykový tablet Apple IpadDUKAZ ZE TO JE SUBGRIDDUKAZ ZE TO JE SUBGRIDDUKAZ ZE TO JE SUBGRIDDUKAZ ZE TO JE SUBGRID</p>
                </a>
                <a class="rating" href="#">
                <div class="rating__box">
            <ul class="stars__textbox">
                <li class="star"><img src="media/star.png" width="18" height="18" alt="star"></li>
                <li class="star"><img src="media/star.png" width="18" height="18" alt="star"></li>
                <li class="star"><img src="media/star.png" width="18" height="18" alt="star"></li>
                <li class="star"><img src="media/star.png" width="18" height="18" alt="star"></li>
                <li class="star"><img src="media/star.png" width="18" height="18" alt="star"></li>
            </ul>
            <span class="ratingValue">4.9</span>
            <span class="ratingValueCount">(279)</span>
        </div>
        </a>
        <div class="discount">

        </div>
    
    <div class="card__textbox">
            <a class="price" href="#">
                8290 Kč
            </a>
            <a class="btn" href="#">
                Vložit do košíku
            </a>
                </div>
        </figure>

        </div>
</body>
</html>
